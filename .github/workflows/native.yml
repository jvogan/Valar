name: Native Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-public:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.13"

      - name: Install validation helpers
        run: brew install jq ripgrep

      - name: Bootstrap public native toolchain
        run: bash ./tools/bootstrap.sh native --with-bridge

      - name: Validate public native surface
        run: bash ./tools/validate.sh --with-bridge
