name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: swift,javascript-typescript

      - name: Install build helpers
        run: brew install jq ripgrep

      - name: Bootstrap dependencies
        run: bash ./tools/bootstrap.sh native --with-bridge

      - name: Build Swift targets
        run: |
          swift build --package-path apps/ValarCLI
          swift build --package-path apps/ValarDaemon

      - name: Analyze
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
